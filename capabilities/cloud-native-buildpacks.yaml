# Naftiko capabilities profile for Cloud Native Buildpacks.
# Capabilities describe high-level workflows the CNB lifecycle, pack
# CLI, kpack, and the buildpack registry support.
provider: cloud-native-buildpacks
name: Cloud Native Buildpacks
description: >-
  Cloud Native Buildpacks transform application source code into OCI
  images. These capabilities cover detecting, building, exporting,
  rebasing, and distributing CNB artifacts through pack, kpack, and
  the buildpack registry.
capabilities:
  - id: cnb.lifecycle.detect
    name: Detect buildpacks
    description: >-
      Run the detect phase to determine which buildpacks in a builder
      apply to a source directory.
    api: cloud-native-buildpacks:lifecycle
    inputs:
      - app-dir
      - builder
      - platform-api
    outputs:
      - build-plan
      - selected-buildpacks

  - id: cnb.lifecycle.build
    name: Build image
    description: >-
      Run the full lifecycle (detect, restore, build, export) to
      produce a runnable OCI image.
    api: cloud-native-buildpacks:pack-cli
    inputs:
      - app-dir
      - builder
      - run-image
      - tag
      - env
      - cache-image
    outputs:
      - image-reference
      - digest

  - id: cnb.lifecycle.rebase
    name: Rebase image
    description: >-
      Swap the run image of an existing CNB-built image without
      rebuilding application layers.
    api: cloud-native-buildpacks:lifecycle
    inputs:
      - image-reference
      - run-image
    outputs:
      - new-digest

  - id: cnb.builder.create
    name: Create builder
    description: >-
      Create a CNB builder image from a TOML config that lists
      buildpacks, the lifecycle, and the run image.
    api: cloud-native-buildpacks:pack-cli
    inputs:
      - builder-config
      - tag
    outputs:
      - builder-image-reference

  - id: cnb.buildpack.package
    name: Package buildpack
    description: Package a buildpack as an OCI artifact for distribution.
    api: cloud-native-buildpacks:pack-cli
    inputs:
      - buildpack-dir
      - tag
      - format
    outputs:
      - package-reference

  - id: cnb.kpack.image.declare
    name: Declare kpack Image
    description: >-
      Declare an Image custom resource so kpack continuously rebuilds
      the OCI image when source or buildpacks change.
    api: cloud-native-buildpacks:kpack
    inputs:
      - source
      - builder-ref
      - tag
      - service-account
    outputs:
      - image-resource

  - id: cnb.registry.search
    name: Search registry
    description: Search the buildpack registry for published buildpacks.
    api: cloud-native-buildpacks:registry
    inputs:
      - query
    outputs:
      - results

  - id: cnb.registry.get
    name: Get registry entry
    description: Retrieve metadata for a published buildpack by ID and version.
    api: cloud-native-buildpacks:registry
    inputs:
      - id
      - version
    outputs:
      - entry
